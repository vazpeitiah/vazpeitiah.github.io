{%- assign images = carousel_images | strip | newline_to_br | split: '<br />' -%}

<div id="carouselExampleIndicators" class="carousel slide" data-ride="false">

        {%- else -%}

  <div class="carousel-inner">
    {% for image in images %}
      {%- if forloop.first -%}
        <div class="carousel-item active">
          <img src="{{ image }}" class="d-block w-100">
        </div>
      {%- else -%}
        <div class="carousel-item">
          <img src="{{ image }}" class="d-block w-100">
        </div>
      {%- endif -%}
    {% endfor %}
  </div>

  <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button" data-slide="prev" style="color: black; font-size: 2rem;">
    <!-- <span class="carousel-control-prev-icon dark bg-dark" aria-hidden="true" ></span> -->
    <span aria-hidden="true"> <i class="fas fa-angle-double-left"></i> </span>
    <span class="sr-only">Previous</span>
  </a>

  <a class="carousel-control-next" href="#carouselExampleIndicators" role="button" data-slide="next" style="color: black; font-size: 2rem;">
    <span aria-hidden="true"> <i class="fas fa-angle-double-right"></i> </span>
    <span class="sr-only">Next</span>
  </a>

</div>
